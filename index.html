<!DOCTYPE html>
<html lang="zh-TW" style="overflow-x:hidden;max-width:100vw;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="華森通報">
<meta name="theme-color" content="#0f1117">
<title>華森行程通報 v8</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0f1117;--ink2:#2a2d38;--ink3:#5a5f72;
  --paper:#f8f6f1;--paper2:#eeeae0;--paper3:#e2ddd2;
  --gold:#c8973a;--gold2:#e8b85a;
  --green:#2d7a4f;--red:#c0392b;--blue:#1a4f8a;
  --purple:#6b3fa0;
  --r:10px;--sh:0 2px 16px rgba(15,17,23,.10);--sh2:0 8px 40px rgba(15,17,23,.16);
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --hh:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{
  font-family:'Sora',sans-serif;background:var(--paper);color:var(--ink);
  min-height:100%;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(200,151,58,.06) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(200,151,58,.03) 40px);
}
/* HEADER */
.app-header{
  position:sticky;top:0;z-index:100;background:var(--ink);
  padding-top:var(--sat);
  display:flex;align-items:flex-end;
  box-shadow:0 1px 12px rgba(0,0,0,.4);
}
.header-inner{
  width:100%;display:flex;align-items:center;
  padding:0 16px;height:var(--hh);gap:10px;
}
.logo-icon{width:32px;height:32px;border-radius:7px;overflow:hidden;flex-shrink:0;}
.logo-icon img{width:100%;height:100%;object-fit:cover;display:block;}
.logo-text{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:#fff;}
.logo-sub{font-size:9px;color:var(--gold2);font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;}
.header-badge{margin-left:auto;font-size:11px;color:var(--gold2);font-family:'DM Mono',monospace;}

/* MAIN */
.app-main{padding:16px 14px calc(80px + var(--sab));max-width:100%;width:100%;margin:0 auto;-webkit-overflow-scrolling:touch;overflow-x:hidden;}

/* CONFIG NOTICE */
.config-notice{
  background:linear-gradient(135deg,#fff8ec,#fff3d4);
  border:1.5px solid var(--gold);border-radius:12px;
  padding:12px 14px;margin-bottom:14px;
  font-size:12px;color:var(--ink2);
  display:flex;align-items:flex-start;gap:10px;line-height:1.6;
}
.config-notice .icon{font-size:18px;flex-shrink:0;}
.config-notice code{font-family:'DM Mono',monospace;background:rgba(200,151,58,.15);padding:1px 5px;border-radius:4px;font-size:11px;color:var(--gold);}

/* LOADING */
.loading-bar{
  background:var(--ink);border-radius:12px;padding:14px 18px;
  margin-bottom:14px;display:flex;align-items:center;gap:12px;
  font-size:13px;color:rgba(255,255,255,.7);
}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--gold2);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-bar.done{background:var(--green);}
.loading-bar.err{background:var(--red);}

/* FORM CARD */
.form-card{background:#fff;border-radius:16px;box-shadow:var(--sh2);overflow:hidden;margin-bottom:16px;margin-top:4px;max-width:100%;}
/* form-header removed */
.form-body{padding:16px;}

/* FORM GRID */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){
  .form-grid{grid-template-columns:1fr;}
  .form-grid .form-group.full{grid-column:1;}
  .time-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
label{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:5px;}
label .req{color:var(--red);}
input,select,textarea{
  font-family:'Sora',sans-serif;font-size:16px;color:var(--ink);
  background:var(--paper);border:1.5px solid var(--paper3);
  border-radius:var(--r);padding:11px 13px;
  transition:border-color .2s,box-shadow .2s;outline:none;
  -webkit-appearance:none;appearance:none;
  width:100%;max-width:100%;box-sizing:border-box;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,151,58,.15);background:#fff;
}
textarea{resize:none;height:80px;}

/* FIXED NOTIFY SECTION */
.fixed-section{
  background:linear-gradient(135deg,#f3eaff,#ede0ff);
  border:1.5px solid var(--purple);border-radius:12px;
  padding:14px;margin-top:4px;
}
.fixed-section.hidden{display:none;}
.fixed-label{font-size:11px;font-weight:700;color:var(--purple);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;}

/* TOGGLE SWITCH */
.toggle-wrap{display:flex;align-items:center;gap:10px;}
.toggle{position:relative;width:46px;height:26px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{
  position:absolute;inset:0;background:var(--paper3);
  border-radius:26px;cursor:pointer;transition:.3s;
}
.toggle-slider::before{
  content:'';position:absolute;height:20px;width:20px;
  left:3px;bottom:3px;background:#fff;border-radius:50%;
  transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.toggle input:checked+.toggle-slider{background:var(--gold);}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px);}
.toggle-text{font-size:13px;font-weight:600;color:var(--ink2);}

/* NOTIFY CHIPS */
.notify-group{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.notify-chip{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 8px;border-radius:24px;border:1.5px solid var(--paper3);
  cursor:pointer;font-size:13px;font-weight:600;color:var(--ink3);
  font-family:'Sora',system-ui,-apple-system,sans-serif;
  background:var(--paper);transition:all .18s;user-select:none;
  width:100%;min-height:46px;-webkit-tap-highlight-color:transparent;
}
.notify-chip input{display:none;}
.notify-chip.checked{border-color:var(--gold);background:linear-gradient(135deg,#fff8ec,#fff3dc);color:var(--gold);box-shadow:0 2px 8px rgba(200,151,58,.2);}
.notify-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--paper3);transition:background .18s;flex-shrink:0;}
.notify-chip.checked .dot{background:var(--gold);}

/* MULTI SELECT */
.multi-select-wrap{position:relative;z-index:10;}
.multi-select-display{
  border:1.5px solid var(--paper3);border-radius:var(--r);
  padding:11px 13px;background:var(--paper);cursor:pointer;
  font-size:14px;color:var(--ink3);
  display:flex;align-items:center;justify-content:space-between;
  transition:border-color .2s;min-height:46px;
}
.multi-select-display.open,.multi-select-display:active{border-color:var(--gold);background:#fff;}
.ms-tags{display:flex;flex-wrap:wrap;gap:4px;flex:1;}
.ms-tag{background:var(--ink);color:#fff;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:500;}
.multi-select-dropdown{
  display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:#fff;border:1.5px solid var(--gold);
  border-radius:var(--r);box-shadow:var(--sh2);
  z-index:500;max-height:260px;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.multi-select-dropdown.open{display:block;}
.mso{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  cursor:pointer;font-size:14px;transition:background .12s;
  border-bottom:1px solid var(--paper2);
}
.mso:last-child{border-bottom:none;}
.mso:active,.mso:hover{background:var(--paper);}
.mso.selected{background:#fff8ec;color:var(--gold);font-weight:600;}
.mso .check{
  width:20px;height:20px;border-radius:5px;
  border:1.5px solid var(--paper3);display:flex;align-items:center;
  justify-content:center;font-size:11px;flex-shrink:0;
}
.mso.selected .check{background:var(--gold);border-color:var(--gold);color:#fff;}
.ms-role{margin-left:auto;font-size:11px;color:var(--ink3);opacity:.7;}
.tags-hint{font-size:11px;color:var(--ink3);margin-top:4px;}

/* SUBMIT */
.btn-submit{
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--ink);font-family:'Sora',sans-serif;
  font-size:15px;font-weight:700;letter-spacing:.02em;
  border:none;border-radius:12px;cursor:pointer;margin-top:12px;margin-bottom:16px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(200,151,58,.32);
  transition:all .22s;-webkit-appearance:none;
}
.btn-submit:active{transform:scale(.97);}
.btn-submit:disabled{opacity:.5;}

/* TOAST */
.toast-wrap{position:fixed;bottom:calc(16px + var(--sab));left:14px;right:14px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{
  background:var(--ink);color:#fff;padding:12px 16px;border-radius:12px;
  font-size:13px;box-shadow:var(--sh2);display:flex;align-items:center;gap:10px;
  animation:toastIn .28s ease;pointer-events:auto;
}
.toast.success{border-left:4px solid var(--green);}
.toast.error{border-left:4px solid var(--red);}
.toast.info{border-left:4px solid var(--gold);}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(12px)}}

/* MODAL */
.modal-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(15,17,23,.55);z-index:300;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-backdrop.open{display:flex;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:#fff;border-radius:20px 20px 0 0;
  padding:24px 20px calc(20px + var(--sab));
  width:100%;max-width:520px;
  box-shadow:0 -8px 40px rgba(0,0,0,.2);
  animation:slideUp .28s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--paper3);margin:0 auto 16px;}
.modal h3{font-family:'Noto Serif TC',serif;font-size:17px;margin-bottom:6px;}
.modal p{font-size:13px;color:var(--ink3);line-height:1.7;margin-bottom:18px;}
.modal-btns{display:flex;gap:10px;}
.btn-cancel{flex:1;background:var(--paper);border:1.5px solid var(--paper3);border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;}
.btn-confirm{flex:2;background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;}


</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="header-inner">
    <div class="logo-icon">
      <img src="./icon-192.png" alt="華森" onerror="this.src='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAMCAgMCAgMDAwMEAwMEBQgFBQQEBQoHBwYIDAoMDAsKCwsNDhIQDQ4RDgsLEBYQERMUFRUVDA8XGBYUGBIUFRT/2wBDAQMEBAUEBQkFBQkUDQsNFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBQUFBT/wAARCAAgACADASIAAhEBAxEB/8QAGQAAAwADAAAAAAAAAAAAAAAAAwYHAQIF/8QAMBAAAQMCBQIBDAMAAAAAAAAAAQIDBAUGAAcREiETMQgUFRgiN0FWdJGStNMWYYH/xAAXAQEBAQEAAAAAAAAAAAAAAAAABgUH/8QAIxEAAgICAAUFAAAAAAAAAAAAAQIDBABBERIxUZFyc6HR4f/aAAwDAQACEQMRAD8ABnPnNfFrZp3JSKPcsum0uE+2zGiR2mQ20joNHakdPtqT9cJfpC5k/GdR+xj9eM+IX223h823+O1ieY5Vdu2UsyKsjABjs98q4YYjEpKjoNZQvSFzJ+M6j9jH68OuSuc98XRmva9IrFyy6lS5spTMmJIaZU26gsuEpUOn24H0xEU0yYtxpCYchS3WjIbSGVEraAJKwNOU6JUdw49U88HD/wCHuM81nXYjy2XEMvTllpxSCEuANOg7T2Oh4OnY4U7lprMatIxHMNnuMTQxCNiFHQ6wXiF9tt4fNt/jtYn7BQl9supUtoLBWlCtpKdeQDzodPfi5Zz5NXtdOadyVej25JqVLmvtvRpcd5gtuo6DQ3Alwe8Ef5hM9HzMkdrOn6/26x+zC7SstakZY2ILHR74hmiESgsOg3lfplYsk3VaYTbVdS4cupK0L8/tkNxvIqhq0R5L6yykLG/UAFQO07SCCyKjbMqu+H9NIodTp7ynaiWFTKuiSlloSH96SAwjepSuQrVISONFd8dKDYLsW5LdmuWhfa4lOtF23JIbjU3qOPLZeZ6resvQI2yXFaK51Qge86bWTl5UKXWcnj/G7ip6rWXLFWqFXEJqGG3S68VoKJC1japW3QjkEHjtikhin5xxTY17f0fGZzvHyng3z6vzzn//2Q=='">

</div>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- CONFIRM MODAL -->
<div class="modal-backdrop" id="confirmModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>確認送出</h3>
    <p>確定要送出這筆行程通報嗎？送出後將立即通知鄭惠方與林香君，並依設定時機自動發送 LINE 通知。</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>

<!-- MAIN -->
<div class="app-main">

  </div>

  <!-- Loading bar -->
  <div class="loading-bar" id="loadingBar" style="display:none">
    <span class="spinner" id="loadSpinner"></span>
    <span id="loadText">正在從 Google Sheets 讀取最新名單…</span>
  </div>

  <!-- FORM -->
  <div class="form-card" id="formCard">
    
    <div class="form-body">
      <form id="scheduleForm" onsubmit="handleSubmit(event)">
        <div class="form-grid">

          <div class="form-group">
            <label>📅 行程日期 <span class="req">*</span></label>
            <input type="date" id="f_date" required>
          </div>

          <div class="form-group">
            <label>🏷️ 行程類型 <span class="req">*</span></label>
            <select id="f_type" required>
              <option value="">請選擇</option>
              <option>會議</option><option>教育訓練</option><option>客戶拜訪</option>
              <option>內部活動</option><option>節日提醒</option><option>案場參訪</option>
              <option>公司聚餐</option><option>典禮儀式</option><option>公司旅遊</option>
              <option>展覽參訪</option><option>廠商拜訪</option><option>聚餐活動</option>
              <option>外部活動</option><option>廠商邀約</option><option>其他</option>
            </select>
          </div>

          <div class="form-group full">
            <label>📝 行程主題 <span class="req">*</span></label>
            <input type="text" id="f_title" placeholder="例：Q2 策略規劃會議" required>
          </div>

          <div class="form-group full">
            <div class="time-row">
              <div class="form-group">
                <label>🕐 開始時間</label>
                <input type="time" id="f_time_start">
              </div>
              <div class="form-group">
                <label>🕔 結束時間</label>
                <input type="time" id="f_time_end">
              </div>
            </div>
          </div>

          <div class="form-group full">
            <label>📍 地點 / 連結</label>
            <input type="text" id="f_location" placeholder="例：台南總部 3F / Google Meet">
          </div>

          <div class="form-group full">
            <label>👥 共同參與人員</label>
            <div class="multi-select-wrap">
              <div class="multi-select-display" id="peopleDisplay" onclick="toggleMS('people')">
                <div class="ms-tags" id="peopleTags"><span style="color:var(--ink3);font-size:14px">請選擇參與人員</span></div>
                <span>▾</span>
              </div>
              <div class="multi-select-dropdown" id="peopleDropdown"></div>
            </div>
            <div class="tags-hint">可複選，系統將查找對應 LINE ID 發送個人通知</div>
          </div>

          <div class="form-group full">
            <label>📣 通知群組</label>
            <div class="multi-select-wrap">
              <div class="multi-select-display" id="groupDisplay" onclick="toggleMS('group')">
                <div class="ms-tags" id="groupTags"><span style="color:var(--ink3);font-size:14px">請選擇群組</span></div>
                <span>▾</span>
              </div>
              <div class="multi-select-dropdown" id="groupDropdown"></div>
            </div>
          </div>

          <!-- 固定通知切換 -->
          <div class="form-group full">
            <label>🔁 固定通知（每年重複）</label>
            <div class="toggle-wrap">
              <label class="toggle">
                <input type="checkbox" id="f_fixed" onchange="toggleFixedSection()">
                <span class="toggle-slider"></span>
              </label>
              <span class="toggle-text" id="fixedToggleText">關閉</span>
            </div>
          </div>

          <!-- 固定通知設定區 -->
          <div class="form-group full fixed-section hidden" id="fixedSection">
            <div class="fixed-label">🗓 固定通知設定</div>
            <div class="form-grid" style="margin-top:0">
              <div class="form-group">
                <label>📅 固定日期（月/日）</label>
                <input type="text" id="f_fixed_date" placeholder="例：5/1　或　12/25">
              </div>
              <div class="form-group">
                <label style="color:var(--purple)">📌 說明</label>
                <input type="text" value="每年此日期自動重送" readonly style="background:#f3eaff;color:var(--purple);font-size:12px;">

          <!-- 通知時機 -->
          <div class="form-group full">
            <label>🔔 通知時機（可複選）</label>
            <div class="notify-group">

                <input type="checkbox" id="n_7day"><span class="dot"></span>提前 7 天
              </label>
              <label class="notify-chip checked" id="chip1" onclick="toggleChip('chip1','n_1day')">

              </label>
              <label class="notify-chip checked" id="chipD" onclick="toggleChip('chipD','n_day')">

              </label>

            <div class="tags-hint" id="fixedChipHint" style="display:none;color:var(--purple)">固定通知模式：通知時機以固定日期為基準計算</div>
          </div>

          <div class="form-group full">
            <label>💬 備註</label>
            <textarea id="f_note" placeholder="其他補充說明、注意事項…"></textarea>
          </div>

        </div>
        <button type="submit" class="btn-submit" id="submitBtn">
          <span>📤</span> 送出通報
        </button>
      </form>
    </div>
  </div>

</div><!-- /app-main -->

<script>

//  STATE

let scriptUrl = 'https://script.google.com/macros/s/AKfycbz218fEQ7wEdkdxFmO88nJu-7TnybuWj9d_p5b45TFye3UbGUUKQ0DfLG6l1D3dGuYutw/exec';  // 已固定設定，無需手動輸入
  localStorage.setItem('hs_script_url', scriptUrl);
let people     = [];
let groups     = [];
let typeList   = [];
let selPeople  = [];
let selGroups  = [];

// ══════════════════════════════════════

// ══════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js', {scope:'./'})
    .catch(e => console.warn('SW:', e));
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f_date').valueAsDate = new Date();

  loadMembers();
});



// ══════════════════════════════════════
//  LOAD MEMBERS FROM SHEETS
// ══════════════════════════════════════
async function loadMembers() {
  if (!scriptUrl) { renderPeopleDropdown(); renderGroupDropdown(); return; }

  const bar  = document.getElementById('loadingBar');
  const spin = document.getElementById('loadSpinner');
  const txt  = document.getElementById('loadText');
  const badge= document.getElementById('syncBadge');

  bar.style.display = 'flex';
  badge.style.color = 'rgba(255,255,255,.3)';

  try {
    const res  = await fetch(scriptUrl + '?action=getMembers');
    const json = await res.json();

    if (json.ok) {
      people   = json.people  || [];
      groups   = json.groups  || [];
      typeList = json.types   || [];

      // 同步類型下拉選單
      if (typeList.length > 0) {
        const sel = document.getElementById('f_type');
        const cur = sel.value;
        while (sel.options.length > 1) sel.remove(1);
        typeList.forEach(t => {
          const opt = document.createElement('option');
          opt.value = opt.text = t;
          sel.appendChild(opt);
        });
        if (cur) sel.value = cur;
      }

      bar.classList.add('done');
      spin.style.display = 'none';
      txt.textContent = `✓ 已同步：${people.length} 位人員、${groups.length} 個群組`;
      badge.textContent = '✓';
      badge.style.color = 'var(--gold2)';
      setTimeout(() => { bar.style.display='none'; }, 2500);
    }
  } catch(e) {
    bar.classList.add('err');
    spin.style.display = 'none';
    txt.textContent = '⚠ 無法連線 Sheets，使用本機記錄';
    badge.textContent = '!';
    badge.style.color = '#ff8080';
    // 嘗試讀 localStorage 快取
    const cached = localStorage.getItem('hs_members');
    if (cached) {
      const c = JSON.parse(cached);
      people = c.people || []; groups = c.groups || [];
      txt.textContent += `（快取：${people.length}人）`;
    }
    setTimeout(() => { bar.style.display='none'; }, 3000);
  }

  // 快取到 localStorage
  if (people.length > 0 || groups.length > 0) {
    localStorage.setItem('hs_members', JSON.stringify({people, groups}));
  }

  renderPeopleDropdown();
  renderGroupDropdown();
}

// ══════════════════════════════════════
//  MULTI-SELECT
// ══════════════════════════════════════
function renderPeopleDropdown() {
  const dd = document.getElementById('peopleDropdown');
  dd.innerHTML = people.length
    ? people.map((p,i) => `
      <div class="mso ${selPeople.includes(i)?'selected':''}" onclick="toggleItem('people',${i})">
        <span class="check">${selPeople.includes(i)?'✓':''}</span>
        <span>${p.name}</span>
        <span class="ms-role">${p.title||''}</span>
      </div>`).join('')
    : '<div style="padding:14px;text-align:center;color:#999;font-size:13px">尚未載入名單</div>';
}
function renderGroupDropdown() {
  const dd = document.getElementById('groupDropdown');
  dd.innerHTML = groups.length
    ? groups.map((g,i) => `
      <div class="mso ${selGroups.includes(i)?'selected':''}" onclick="toggleItem('group',${i})">
        <span class="check">${selGroups.includes(i)?'✓':''}</span>
        <span>${g.name}</span>
      </div>`).join('')
    : '<div style="padding:14px;text-align:center;color:#999;font-size:13px">尚未載入名單</div>';
}
function toggleMS(type) {
  const dd = document.getElementById(type+'Dropdown');
  const d  = document.getElementById(type+'Display');
  const open = dd.classList.toggle('open');
  d.classList.toggle('open', open);
  if (open) setTimeout(() => document.addEventListener('click', e => closeMS(e, type), {once:true}), 0);
}
function closeMS(e, type) {
  const dd = document.getElementById(type+'Dropdown');
  const d  = document.getElementById(type+'Display');
  if (!dd?.contains(e.target) && !d?.contains(e.target)) {
    dd?.classList.remove('open'); d?.classList.remove('open');
  }
}
function toggleItem(type, i) {
  const sel  = type==='people' ? selPeople : selGroups;
  const data = type==='people' ? people    : groups;
  const tags = document.getElementById(type+'Tags');
  const idx  = sel.indexOf(i);
  if (idx>-1) sel.splice(idx,1); else sel.push(i);
  if (type==='people') renderPeopleDropdown(); else renderGroupDropdown();
  if (sel.length) {
    tags.innerHTML = sel.map(i=>`<span class="ms-tag">${data[i].name}</span>`).join('');
  } else {
    tags.innerHTML = `<span style="color:var(--ink3);font-size:14px">${type==='people'?'請選擇參與人員':'請選擇群組'}</span>`;
  }
}

// ══════════════════════════════════════
//  FIXED NOTIFY TOGGLE
// ══════════════════════════════════════
function toggleFixedSection() {
  const cb    = document.getElementById('f_fixed');
  const sec   = document.getElementById('fixedSection');
  const txt   = document.getElementById('fixedToggleText');
  const hint  = document.getElementById('fixedChipHint');
  const dateF = document.getElementById('f_date');
  sec.classList.toggle('hidden', !cb.checked);
  txt.textContent = cb.checked ? '開啟（每年重複）' : '關閉';
  hint.style.display = cb.checked ? 'block' : 'none';
  if (cb.checked) dateF.disabled = true;
  else dateF.disabled = false;
}

// ══════════════════════════════════════
//  CHIPS
// ══════════════════════════════════════
function toggleChip(chipId, cbId) {
  const chip = document.getElementById(chipId);
  const cb   = document.getElementById(cbId);
  cb.checked = !cb.checked;
  chip.classList.toggle('checked', cb.checked);
}

// ══════════════════════════════════════
//  TOAST
// ══════════════════════════════════════
function toast(msg, type='info') {
  const w = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = {success:'✅',error:'❌',info:'ℹ️'};
  t.innerHTML = `<span>${icons[type]||'📢'}</span><span>${msg}</span>`;
  w.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut .28s ease forwards';setTimeout(()=>t.remove(),280);},3200);
}

// ══════════════════════════════════════
//  FORM SUBMIT
// ══════════════════════════════════════
function handleSubmit(e) {
  e.preventDefault();
  if (!scriptUrl) { toast('請先設定 Script URL','error'); return; }
  const isFixed = document.getElementById('f_fixed').checked;
  const date    = document.getElementById('f_date').value;
  const type    = document.getElementById('f_type').value;
  const title   = document.getElementById('f_title').value.trim();
  if ((!date && !isFixed) || !type || !title) { toast('請填寫必填欄位','error'); return; }
  if (isFixed && !document.getElementById('f_fixed_date').value.trim()) {
    toast('請填寫固定日期（月/日）','error'); return;
  }
  pendingData = {
    date:      isFixed ? '' : date,
    type, title,
    timeStart: document.getElementById('f_time_start').value,
    timeEnd:   document.getElementById('f_time_end').value,
    location:  document.getElementById('f_location').value,
    members:   selPeople.map(i=>people[i]?.name||'').filter(Boolean).join(','),
    groups:    selGroups.map(i=>groups[i]?.name||'').filter(Boolean).join(','),
    note:      document.getElementById('f_note').value,
    fixed:     isFixed ? '是' : '否',
    fixedDate: document.getElementById('f_fixed_date').value.trim(),
    notify7:   document.getElementById('n_7day').checked ? '是' : '否',
    notify1:   document.getElementById('n_1day').checked ? '是' : '否',
    notifyD:   document.getElementById('n_day').checked  ? '是' : '否',
  };
  document.getElementById('confirmModal').classList.add('open');
}

function closeModal() { document.getElementById('confirmModal').classList.remove('open'); }

async function confirmSubmit() {
  closeModal();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="border-top-color:var(--ink)"></span>送出中…';

  const url = scriptUrl + '?action=add&' + new URLSearchParams(pendingData);

  // 用 script tag 注入方式呼叫（避免 CORS 問題，確保 Sheets 寫入）
  const success = await callScriptViaTag(url, 8000);

  if (success) {
    toast('行程通報已送出！負責人將立即收到 LINE 通知。', 'success');
  } else {
    toast('行程已送出（請至 Google Sheets 確認是否寫入）', 'info');
  }
  resetForm();
  btn.disabled = false;
  btn.innerHTML = '<span>📤</span> 送出通報';
}

// 透過動態 script 標籤呼叫 Apps Script，繞過 CORS 限制
function callScriptViaTag(url, timeout = 8000) {
  return new Promise(resolve => {
    const script = document.createElement('script');
    const cbName = '_cb_' + Date.now();
    const timer  = setTimeout(() => {
      cleanup();
      resolve(false); // timeout，但 Script 通常已收到
    }, timeout);

    window[cbName] = () => { cleanup(); resolve(true); };

    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    // Apps Script 不支援 JSONP callback，所以直接注入後等 timeout
    // 但這樣能確保 GET 請求確實送出（非 opaque）
    script.onerror = () => { cleanup(); resolve(true); }; // 即使 CORS error 也代表請求已送達
    script.src = url;
    document.head.appendChild(script);
  });
}

function resetForm() {
  document.getElementById('scheduleForm').reset();
  document.getElementById('f_date').valueAsDate = new Date();
  selPeople=[]; selGroups=[];
  renderPeopleDropdown(); renderGroupDropdown();
  document.getElementById('peopleTags').innerHTML = '<span style="color:var(--ink3);font-size:14px">請選擇參與人員</span>';
  document.getElementById('groupTags').innerHTML  = '<span style="color:var(--ink3);font-size:14px">請選擇群組</span>';
  ['chip7','chip1','chipD'].forEach(id=>document.getElementById(id).classList.remove('checked'));
  document.getElementById('chip1').classList.add('checked');
  document.getElementById('chipD').classList.add('checked');
  document.getElementById('n_1day').checked = true;
  document.getElementById('n_day').checked  = true;
  document.getElementById('f_fixed').checked = false;
  document.getElementById('fixedSection').classList.add('hidden');
  document.getElementById('fixedToggleText').textContent = '關閉';
  document.getElementById('fixedChipHint').style.display = 'none';
  document.getElementById('f_date').disabled = false;
}
</script>
